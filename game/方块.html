	<body>
		<div class="control">

			<p href="#" id="jiasu" class="daoju">2.25秒12m加速</p>

			<p href="#" class="daoju jia" style="font-size: 20px;line-height: 5px;font-family: '华文新魏'; " >赞助商：</p>
			<p href="#" class="daoju jia" style="font-size: 20px;line-height: 5px;font-family: '华文新魏'; " >张祖宁</p>

			<p href="#" class="daoju" style="font-size: 12px;line-height: 15px;font-family: '华文新魏'; ">每道具花费5金</p>
		</div>

		<div class="xuanze">

				选择一个会赢的方块
			</p>
			&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<input type="radio" name="xz" id="redf" />

			蓝方块
			<br />
			&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<input type="radio" name="xz" id="lightgreenf" />
			绿方块

				确定
			</button>
		</div>
		<div class="container">
			<div id="red" class="block"></div>
			<div id="yellow" class="block"></div>
			<div id="skyblue" class="block"></div>
			<div id="lightgreen" class="block"></div>

		<a onclick="gohistory()" href="#">重新游戏</a>
